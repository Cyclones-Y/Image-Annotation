services:
  # 前端服务
  image-annotation-frontend:
    build:
      context: ../Image-Annotation-frontend
      dockerfile: Dockerfile
    image: image-annotation-frontend:latest
    container_name: image-annotation-frontend-test
    ports:
      - "80:80"
    volumes:
      - ../Image-Annotation-frontend/bin/nginx.dockerpg.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - image-annotation-backend-pg
    networks:
      - image-annotation-network-test

  # 后端服务（PostgreSQL版本）
  image-annotation-backend-pg:
    build:
      context: ../Image-Annotation-backend
      dockerfile: Dockerfile.pg
    image: image-annotation-backend-pg:latest
    container_name: image-annotation-backend-pg-test
    ports:
      - "9099:9099"
    depends_on:
      image-annotation-pg:
        condition: service_healthy
      image-annotation-redis:
        condition: service_healthy
    networks:
      - image-annotation-network-test

  # PostgreSQL服务
  image-annotation-pg:
    image: postgres:14
    container_name: image-annotation-pg-test
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ruoyi-fastapi
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --lc-collate=C --lc-ctype=C
    ports:
      - "15433:5432"
    volumes:
      - ../Image-Annotation-backend/sql/ruoyi-fastapi-pg.sql:/docker-entrypoint-initdb.d/01-ruoyi-fastapi-pg.sql
      - ./disable_captcha.sql:/docker-entrypoint-initdb.d/02-disable-captcha.sql
    networks:
      - image-annotation-network-test
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Redis服务
  image-annotation-redis:
    image: redis:latest
    container_name: image-annotation-redis-test
    ports:
      - "16381:6379"
    networks:
      - image-annotation-network-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

# 网络配置
networks:
  image-annotation-network-test:
    name: image-annotation-network-test
    driver: bridge
