services:
  # 前端服务
  image-annotation-frontend:
    build:
      context: ./Image-Annotation-frontend
      dockerfile: Dockerfile
    image: image-annotation-frontend:latest
    container_name: image-annotation-frontend
    ports:
      - "12580:80"
    volumes:
      - ./Image-Annotation-frontend/bin/nginx.dockerpg.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - image-annotation-backend-pg
    networks:
      - image-annotation-network

  # 后端服务（PostgreSQL版本）
  image-annotation-backend-pg:
    build:
      context: ./Image-Annotation-backend
      dockerfile: Dockerfile.pg
    image: image-annotation-backend-pg:latest
    container_name: image-annotation-backend-pg
    ports:
      - "19099:9099"
    depends_on:
      image-annotation-pg:
        condition: service_healthy
      image-annotation-redis:
        condition: service_healthy
    networks:
      - image-annotation-network

  # PostgreSQL服务
  image-annotation-pg:
    image: postgres:14
    container_name: image-annotation-pg
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ruoyi-fastapi
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --lc-collate=C --lc-ctype=C
    ports:
      - "15432:5432"
    volumes:
      - ./Image-Annotation-backend/sql/ruoyi-fastapi-pg.sql:/docker-entrypoint-initdb.d/ruoyi-fastapi-pg.sql
    networks:
      - image-annotation-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Redis服务
  image-annotation-redis:
    image: redis:latest
    container_name: image-annotation-redis
    ports:
      - "16379:6379"
    networks:
      - image-annotation-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

  image-annotation-pg-secondary:
    image: postgres:14
    container_name: image-annotation-pg-secondary
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: image-annotation-secondary
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --lc-collate=C --lc-ctype=C
    ports:
      - "15433:5432"
    networks:
      - image-annotation-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 30

  frontend-image-gallery:
    build:
      context: ./frontend-image-gallery
      dockerfile: Dockerfile
    image: frontend-image-gallery:latest
    container_name: frontend-image-gallery
    ports:
      - "12680:80"
    depends_on:
      - image-annotation-backend-pg
    networks:
      - image-annotation-network

# 网络配置
networks:
  image-annotation-network:
    name: image-annotation-network
    driver: bridge
